server:
  port: 8080
spring:
  application:
    name: MyRecipeWhisper-Backend
  datasource:
    url: jdbc:mysql://LOCALHOST:3306/mysrecipewhisper?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true